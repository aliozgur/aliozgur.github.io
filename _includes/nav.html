<!-- Navigation -->
<nav class="navbar navbar-default navbar-custom navbar-fixed-top">
    <div class="container-fluid">
        <div class="navbar-header page-scroll">
            <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
                <span class="sr-only">Toggle navigation</span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <!-- Links: absolutely centred on desktop -->
            <ul class="nav navbar-nav navbar-center-links">
                <li>
                    <a href="{{ site.baseurl }}/">Home</a>
                </li>
                {% for page in site.pages %}{% if page.title and page.url != '/search/' %}
                <li>
                    <a href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
                </li>
                {% endif %}{% endfor %}
            </ul>

            <!-- Search: pushed to the right -->
            <form id="search-form" role="search" class="navbar-search-outer"
                  action="{{ "/search/" | prepend: site.baseurl }}" method="get">
                <div class="search-form-wrapper">
                    <input type="text" id="search-input" name="q"
                           placeholder="Search..." autocomplete="off" spellcheck="false">
                    <button type="submit" class="search-submit-btn" aria-label="Search">
                        <i class="fa fa-chevron-right"></i>
                    </button>
                </div>
            </form>
        </div>
        <!-- /.navbar-collapse -->
    </div>
</nav>
